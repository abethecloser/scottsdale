<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Scottsdale Sales Training | Compare Homepage Designs</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EFEDE8;--bar:#FFFFFF;--ink:#191613;--mute:#6E6760;--line:rgba(25,22,19,.12);
    --accent:#191613;
    --display:"Space Grotesk",sans-serif;--sans:"Inter",sans-serif;--ease:cubic-bezier(.16,.84,.3,1);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;min-height:100%;overflow:hidden}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  /* Toolbar */
  .bar{flex:0 0 auto;background:var(--bar);color:var(--ink);display:flex;align-items:center;gap:1rem;
    padding:.8rem 1.2rem;flex-wrap:wrap;box-shadow:0 2px 14px rgba(25,22,19,.07);z-index:10;border-bottom:1px solid var(--line)}
  .bar__title{display:flex;flex-direction:column;line-height:1.15;margin-right:auto}
  .bar__title b{font-family:var(--display);font-weight:700;font-size:1.12rem;letter-spacing:-.02em}
  .bar__title span{font-size:.7rem;letter-spacing:.13em;text-transform:uppercase;color:var(--mute)}
  .seg{display:inline-flex;background:#F1EFEA;border:1px solid var(--line);border-radius:100px;padding:3px}
  .seg button{font-size:.82rem;font-weight:600;padding:.45em 1em;border-radius:100px;color:var(--mute);transition:.25s var(--ease)}
  .seg button.on{background:var(--accent);color:#fff}
  .toggle{display:inline-flex;align-items:center;gap:.5em;font-size:.82rem;font-weight:600;color:var(--ink)}
  .toggle input{accent-color:var(--accent);width:16px;height:16px}
  .bar .hint{font-size:.74rem;color:var(--mute)}

  /* Stage */
  .stage{flex:1 1 auto;overflow:auto;padding:26px;scroll-behavior:smooth;
    background:
      radial-gradient(circle at 1px 1px,rgba(25,22,19,.06) 1px,transparent 0) 0 0/22px 22px,
      var(--bg)}
  .rail{display:flex;gap:26px;align-items:flex-start;justify-content:flex-start;min-width:min-content;margin-inline:auto;width:fit-content}

  /* Phone panel */
  .panel{flex:0 0 auto;display:flex;flex-direction:column;gap:11px}
  .panel__head{display:flex;align-items:center;justify-content:space-between;gap:.6rem}
  .panel__label{display:flex;flex-direction:column;line-height:1.2}
  .panel__label b{font-family:var(--display);font-weight:700;font-size:1.02rem}
  .panel__label span{font-size:.72rem;color:var(--mute);letter-spacing:.02em}
  .panel__open{display:inline-flex;align-items:center;gap:.35em;font-size:.78rem;font-weight:600;color:#fff;
    border-radius:100px;padding:.45em .95em;background:var(--accent);transition:.25s var(--ease)}
  .panel__open:hover{transform:translateY(-2px);opacity:.9}
  .panel__open svg{width:.95em;height:.95em}

  .device{background:#fff;border-radius:30px;padding:10px;box-shadow:0 22px 50px rgba(25,22,19,.18);position:relative;border:1px solid rgba(25,22,19,.08)}
  .device::before{content:"";position:absolute;top:14px;left:50%;transform:translateX(-50%);width:46px;height:5px;
    background:rgba(25,22,19,.14);border-radius:100px;z-index:3}
  .device iframe{display:block;border:0;border-radius:22px;background:#fff;width:390px;height:760px}

  body.mode-desktop .device{border-radius:14px;padding:8px}
  body.mode-desktop .device::before{display:none}
  body.mode-desktop .device iframe{width:1100px;height:720px;border-radius:8px}

  .stage::-webkit-scrollbar{height:12px;width:12px}
  .stage::-webkit-scrollbar-thumb{background:rgba(25,22,19,.22);border-radius:100px;border:3px solid var(--bg)}

  @media(max-width:560px){
    .bar{gap:.6rem;padding:.65rem .85rem}
    .bar__title b{font-size:1rem}
    .stage{padding:14px}
    .rail{gap:14px}
    .device iframe{width:86vw;max-width:390px;height:74vh}
    body.mode-desktop .device iframe{width:86vw;height:74vh}
  }
</style>
</head>
<body class="mode-mobile">

<div class="bar">
  <div class="bar__title">
    <b>Compare Packages</b>
    <span>Scottsdale Sales Training · Basic · Standard · Premium</span>
  </div>

  <div class="seg" role="group" aria-label="Preview width">
    <button id="btn-mobile" class="on">Mobile</button>
    <button id="btn-desktop">Desktop</button>
  </div>

  <label class="toggle"><input type="checkbox" id="sync"> Sync scroll</label>

  <span class="hint">Each frame scrolls on its own · scroll sideways to see all three</span>
</div>

<div class="stage" id="stage">
  <div class="rail">

    <div class="panel">
      <div class="panel__head">
        <div class="panel__label"><b>Basic</b><span>Get found · single scroll</span></div>
        <a class="panel__open" href="index-basic.html" target="_blank" rel="noopener">Open <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M7 7h10v10"/></svg></a>
      </div>
      <div class="device"><iframe class="frame" data-i="0" src="index-basic.html" title="Basic" loading="eager"></iframe></div>
    </div>

    <div class="panel">
      <div class="panel__head">
        <div class="panel__label"><b>Standard</b><span>Look established · bento, gallery, form</span></div>
        <a class="panel__open" href="index-standard.html" target="_blank" rel="noopener">Open <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M7 7h10v10"/></svg></a>
      </div>
      <div class="device"><iframe class="frame" data-i="1" src="index-standard.html" title="Standard" loading="eager"></iframe></div>
    </div>

    <div class="panel">
      <div class="panel__head">
        <div class="panel__label"><b>Premium</b><span>Stand out · video, case studies, blog</span></div>
        <a class="panel__open" href="index-premium.html" target="_blank" rel="noopener">Open <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M7 7h10v10"/></svg></a>
      </div>
      <div class="device"><iframe class="frame" data-i="2" src="index-premium.html" title="Premium" loading="eager"></iframe></div>
    </div>

  </div>
</div>

<script>
(function(){
  var body=document.body;
  var bm=document.getElementById('btn-mobile');
  var bd=document.getElementById('btn-desktop');
  var sync=document.getElementById('sync');
  var frames=Array.prototype.slice.call(document.querySelectorAll('.frame'));

  function setMode(mobile){
    body.classList.toggle('mode-mobile',mobile);
    body.classList.toggle('mode-desktop',!mobile);
    bm.classList.toggle('on',mobile);
    bd.classList.toggle('on',!mobile);
  }
  bm.addEventListener('click',function(){setMode(true);});
  bd.addEventListener('click',function(){setMode(false);});

  var locked=false;
  function attach(){
    frames.forEach(function(f){
      var win;
      try{ win=f.contentWindow; }catch(e){ return; }
      try{
        win.addEventListener('scroll',function(){
          if(!sync.checked||locked) return;
          locked=true;
          var src=win.document.documentElement;
          var max=Math.max(1,src.scrollHeight-win.innerHeight);
          var ratio=win.scrollY/max;
          frames.forEach(function(g){
            if(g===f) return;
            try{
              var w=g.contentWindow,d=w.document.documentElement;
              var m=Math.max(1,d.scrollHeight-w.innerHeight);
              w.scrollTo(0,ratio*m);
            }catch(e){}
          });
          requestAnimationFrame(function(){locked=false;});
        },{passive:true});
      }catch(e){}
    });
  }
  var loaded=0;
  frames.forEach(function(f){
    f.addEventListener('load',function(){ loaded++; if(loaded===frames.length) attach(); });
  });

  sync.addEventListener('change',function(){
    if(sync.checked){
      try{
        var w0=frames[0].contentWindow, d0=w0.document.documentElement;
        var r=w0.scrollY/Math.max(1,d0.scrollHeight-w0.innerHeight);
        frames.forEach(function(g){try{var w=g.contentWindow,d=w.document.documentElement;w.scrollTo(0,r*Math.max(1,d.scrollHeight-w.innerHeight));}catch(e){}});
      }catch(e){}
    }
  });
})();
</script>
</body></html>
